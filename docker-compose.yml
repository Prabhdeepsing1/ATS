version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: queuegate-db
    environment:
      POSTGRES_DB: queuegate
      POSTGRES_USER: queuegate
      POSTGRES_PASSWORD: queuegate
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queuegate"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: queuegate-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://queuegate:queuegate@db:5432/queuegate
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: queuegate-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: queuegate-network
